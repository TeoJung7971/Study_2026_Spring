<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #fbfaf6; }
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #172326; }
      .subtitle { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #556366; }
      .lane { fill: #f0eee7; stroke: #ded8c8; stroke-width: 1; rx: 10; }
      .laneText { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #687275; letter-spacing: 1px; }
      .node { fill: #ffffff; stroke: #30464b; stroke-width: 2; rx: 8; }
      .factory { fill: #153f46; stroke: #153f46; }
      .model { fill: #e1f0ed; stroke: #22706f; }
      .module { fill: #eef5ff; stroke: #376996; }
      .layer { fill: #fff5d6; stroke: #9a6b00; }
      .helper { fill: #f1e7fb; stroke: #70509b; }
      .textDark { font: 700 18px "Consolas", "Segoe UI", monospace; fill: #172326; }
      .textLight { font: 700 20px "Consolas", "Segoe UI", monospace; fill: #ffffff; }
      .small { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #4e5d60; }
      .smallLight { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #eaf3f4; }
      .edge { fill: none; stroke: #53666a; stroke-width: 2.2; }
      .edgeSoft { fill: none; stroke: #89979a; stroke-width: 1.8; }
      .edgeCall { fill: none; stroke: #8d6b2a; stroke-width: 2; stroke-dasharray: 7 6; }
      .note { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #687275; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#53666a"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#89979a"/>
    </marker>
    <marker id="arrowCall" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8d6b2a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text class="title" x="700" y="48" text-anchor="middle">make_model() Direct Architecture Tree</text>
  <text class="subtitle" x="700" y="76" text-anchor="middle">Only classes/functions on the construction path are shown. Repeated blocks are compressed.</text>

