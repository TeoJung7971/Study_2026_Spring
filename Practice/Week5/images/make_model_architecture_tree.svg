  <text class="textDark" x="1252" y="647" text-anchor="middle">Connection</text>

  <rect class="node helper" x="1175" y="715" width="155" height="54"/>
  <text class="textDark" x="1252" y="749" text-anchor="middle">LayerNorm</text>

